<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redeem Coupon</title>

<style>
    .logo{
    font-size:28px;
    font-weight:700;
    color:#E91E63;
    margin-bottom:15px;
}

.tagline{
    color:#64748B;
    font-size:16px;
    margin-bottom:35px;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:450px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:14px;
    margin:15px 0;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:18px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:#22c55e;
    color:white;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#result{
    margin-top:20px;
}

</style>
</head>

<body>

<div class="card">
    <div class="logo">❤️ LoveView</div>

<div class="tagline">
    Reviews. Rewards. Relationships.
</div>

<h1>🎟️ Redeem LoveBack</h1>

<input
id="coupon"
placeholder="Enter LoveBack Code">

<button onclick="redeemCoupon()">
Redeem LoveBack
</button>

<div id="result"></div>

</div>

<script>

const trackerUrl =
"https://script.google.com/macros/s/AKfycbxbP8KXs5asASmq76L9Gs2mo3u1JOhQo4KEIocwIJR1Fj5xpfqkMwXmC3DJg9xmSw8/exec";

function redeemCoupon(){

    const coupon =
        document.getElementById("coupon")
        .value
        .trim()
        .toUpperCase();

    if(!coupon){
        alert("Please enter a coupon code");
        return;
    }

    fetch(
        trackerUrl +
        "?action=redeem&coupon=" +
        encodeURIComponent(coupon)
    )
    .then(response => response.text())
    .then(result => {

if(result === "SUCCESS"){

    document.getElementById("result").innerHTML =
        "<h2>✅ LoveBack Redeemed</h2>";

}
else if(result === "EXPIRED"){

    document.getElementById("result").innerHTML =
        "<h2>❌ LoveBack Expired</h2>";

}
else if(result === "ALREADY_USED"){

    document.getElementById("result").innerHTML =
        "<h2>⚠️ LoveBack Already Redeemed</h2>";

}
else{

    document.getElementById("result").innerHTML =
        "<h2>❌ LoveBack Not Found</h2>";

}

});
}

</script>

</body>
</html>
