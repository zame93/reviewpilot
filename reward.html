<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claim Your Reward</title>

<style>

body{
    font-family:Inter, Arial, sans-serif;
    background:#FFF8F5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:40px;
    border-radius:24px;
    max-width:500px;
    width:90%;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.brand{
    font-size:28px;
    font-weight:700;
    color:#E91E63;
    margin-bottom:10px;
}

.tagline{
    color:#888;
    font-size:14px;
    margin-bottom:25px;
}

h1{
    color:#1E293B;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    line-height:1.6;
    margin-bottom:25px;
}

p{
    color:#666;
}

input{
    width:100%;
    padding:14px;
    margin-top:12px;
    margin-bottom:12px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:16px;
    box-sizing:border-box;
}

input:focus{
    outline:none;
    border-color:#E91E63;
}

button{
    width:100%;
    padding:15px;
    border:none;
    background:#E91E63;
    color:white;
    font-size:18px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    opacity:0.95;
}

#result{
    margin-top:25px;
}

.ticket{
    margin-top:25px;
    background:white;
    border:2px dashed #E91E63;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    position:relative;
}
    .ticket::before,
.ticket::after{
    content:"";
    position:absolute;
    width:40px;
    height:40px;
    background:#f4f6f9;
    border-radius:50%;
    top:50%;
    transform:translateY(-50%);
}
.ticket::before{
    left:-20px;
}

.ticket::after{
    right:-20px;
}

.ticket-top{
    background:#E91E63;
    color:white;
    padding:18px;
}

.ticket-top h2{
    margin:0;
    font-size:24px;
}

.ticket-body{
    padding:20px;
}

.ticket-label{
    color:#888;
    font-size:14px;
    margin-bottom:8px;
}

.coupon{
    font-size:48px;
    font-weight:800;
    color:#E91E63;
    letter-spacing:4px;
    margin-bottom:20px;
    text-align:center;
}

.expiry-date{
    font-size:18px;
    font-weight:600;
    color:#1E293B;
}

.ticket-footer{
    border-top:2px dashed #ddd;
    padding:15px;
    background:#FFF8F5;
    color:#E91E63;
    font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<div class="brand">
❤️ LoveView
</div>

<div class="tagline">
Reviews. Rewards. Relationships.
</div>

<h1>🎁 Your Thank You Gift</h1>

<p class="subtitle">
Thank you for sharing your experience.
Unlock your reward below.
</p>

<input
type="text"
id="name"
placeholder="Your Name">

<input
type="tel"
id="mobile"
placeholder="Mobile Number">

<button onclick="claimReward()">
🎉 Unlock My Gift
</button>

<div id="result"></div>

</div>

<script>

const trackerUrl =
"https://script.google.com/macros/s/AKfycbxbP8KXs5asASmq76L9Gs2mo3u1JOhQo4KEIocwIJR1Fj5xpfqkMwXmC3DJg9xmSw8/exec";

function claimReward(){

    const name =
    document.getElementById("name").value.trim();

    const mobile =
    document.getElementById("mobile").value.trim();

    if(name.length < 3){
   alert("Please enter a valid name");
   return;
}

if(!/^[0-9]{10}$/.test(mobile)){
   alert("Please enter a valid 10-digit mobile number");
   return;
}

    fetch(
        trackerUrl +
        "?action=reward" +
        "&name=" +
        encodeURIComponent(name) +
        "&mobile=" +
        encodeURIComponent(mobile)
    )
    .then(response => response.text())
    .then(coupon => {

    document.getElementById("name").style.display = "none";
    document.getElementById("mobile").style.display = "none";

    document.querySelector("button").style.display = "none";
 const expiryText =
new Date(Date.now() + 14 * 24 * 60 * 60 * 1000)
.toLocaleDateString();       
    document.getElementById("result").innerHTML =

    "<h2>🎉 Thank You!</h2>" +

    "<p>Your reward has been unlocked.</p>" +

    "<div class='ticket'>" +

        "<div class='ticket-top'>" +
            "<h2>🎁 FREE DESSERT</h2>" +
        "</div>" +

        "<div class='ticket-body'>" +

            "<p class='ticket-label'>Coupon Code</p>" +

            "<div class='coupon'>" +
                coupon +
            "</div>" +

            "<p class='ticket-label'>Valid Until</p>" +

            "<p class='expiry-date'>" +
                expiryText +
            "</p>" +

        "</div>" +

        "<div class='ticket-footer'>" +
            "❤️ Powered by LoveView" +
        "</div>" +

    "</div>" +

    "<p style='margin-top:15px;'>Show this code on your next visit.</p>";

});

}

</script>

</body>
</html>
