<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">



<style>
    .logo{
    font-size:28px;
    font-weight:700;
    color:#E91E63;
    margin-bottom:15px;
}

.tagline{
    color:#64748B;
    font-size:16px;
    margin-bottom:35px;
}

body{
    font-family:Arial,sans-serif;
    background:#f3f4f6;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:white;
    padding:40px;
    border-radius:20px;
    width:500px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:18px;
    margin:15px 0;
    font-size:22px;
    border:1px solid #ddd;
    border-radius:12px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:18px;
    font-size:22px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

#result{
    margin-top:25px;
    text-align:left;
    font-size:20px;
}

</style>

</head>
<body>

<div class="container">
<div class="logo">❤️ LoveView</div>

<div class="tagline">
    Reviews. Rewards. Relationships.
</div>

<h1>🔍 Verify LoveBack</h1>
    <div class="subtitle">
    Check the validity and status of a LoveBack reward.
</div>

<input
id="coupon"
placeholder="Enter LoveBack Code">

<button onclick="verifyCoupon()">
Verify LoveBack
</button>

<div id="result"></div>

</div>

<script>

const trackerUrl =
"https://script.google.com/macros/s/AKfycbxbP8KXs5asASmq76L9Gs2mo3u1JOhQo4KEIocwIJR1Fj5xpfqkMwXmC3DJg9xmSw8/exec";

function verifyCoupon(){

    const coupon =
        document.getElementById("coupon")
        .value
        .trim()
        .toUpperCase();

    if(!coupon){
        alert("Enter coupon");
        return;
    }

    fetch(
        trackerUrl +
        "?action=verify&coupon=" +
        encodeURIComponent(coupon)
    )
    .then(response => response.text())
    .then(result => {

        document.getElementById("result").innerHTML =
            result;

    });

}

</script>

</body>
</html>
