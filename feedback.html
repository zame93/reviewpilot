<h2>How can we improve?</h2>

<select id="issue">
  <option>Food Quality</option>
  <option>Service Delay</option>
  <option>Missing Order</option>
  <option>Incorrect Order</option>
  <option>Staff Behaviour</option>
  <option>Cleanliness</option>
  <option>Other</option>
</select>

<textarea
  id="comments"
  placeholder="Tell us what happened">
</textarea>

<input
  id="mobile"
  placeholder="Mobile Number (Optional)">

<button onclick="submitFeedback()">
  Submit Feedback
</button>

<script>

const params = new URLSearchParams(window.location.search);
const rating = params.get("rating");

const trackerUrl =
"https://script.google.com/macros/s/AKfycbxbP8KXs5asASmq76L9Gs2mo3u1JOhQo4KEIocwIJR1Fj5xpfqkMwXmC3DJg9xmSw8/exec";

async function submitFeedback() {

    const issue =
        document.getElementById("issue").value;

    const comments =
        document.getElementById("comments").value;

    const mobile =
        document.getElementById("mobile").value;

    fetch(
        trackerUrl +
        "?rating=" + encodeURIComponent(rating) +
        "&issue=" + encodeURIComponent(issue) +
        "&comments=" + encodeURIComponent(comments) +
        "&mobile=" + encodeURIComponent(mobile),
        { mode: "no-cors" }
    ).finally(() => {

        alert("Thank you for your feedback!");

        window.location.href = "index.html";

    });

}

</script>
