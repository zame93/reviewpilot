<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ReviewPilot</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:100%;
    max-width:500px;
    padding:40px 30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.logo{
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
}

.tagline{
    color:#666;
    margin-bottom:30px;
}

h1{
    color:#222;
    margin-bottom:10px;
}

.subtitle{
    color:#777;
    margin-bottom:35px;
}

.stars{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:20px;
}

.star{
    font-size:42px;
    cursor:pointer;
    transition:0.2s;
    user-select:none;
}

.star:hover{
    transform:scale(1.15);
}

.note{
    color:#999;
    font-size:14px;
    margin-top:25px;
}

.loading{
    display:none;
    margin-top:20px;
    color:#444;
    font-weight:bold;
}

@media(max-width:600px){

    .container{
        padding:30px 20px;
    }

    .star{
        font-size:34px;
    }

    h1{
        font-size:24px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">ReviewPilot</div>

    <div class="tagline">
        Reputation Management Platform
    </div>

    <h1>How was your experience?</h1>

    <div class="subtitle">
        Tap a star to rate your visit
    </div>

    <div class="stars">

        <span class="star" onclick="rate(1)">⭐</span>
        <span class="star" onclick="rate(2)">⭐</span>
        <span class="star" onclick="rate(3)">⭐</span>
        <span class="star" onclick="rate(4)">⭐</span>
        <span class="star" onclick="rate(5)">⭐</span>

    </div>

    <div id="loading" class="loading">
        Thank you for your feedback...
    </div>

    <div class="note">
        Your feedback helps us improve our service.
    </div>

</div>

<script>

const reviewUrl = "https://share.google/vzGgHviaoZLhTGFOl";

const trackerUrl =
"https://script.google.com/macros/s/AKfycbzjdUSXAQOlj0I-gre4DE1AxmCF9DkLcMzsk-UsonrjgQ8iwBP1e92p-dC2K4zgXD8/exec";

const formBase =
"https://docs.google.com/forms/d/e/1FAIpQLScIPgdQQQrjHUmPQ7EuKMWms8BAzNHqNS64lL6NDsL54VWNpw/viewform?usp=pp_url&entry.1376820106=";

const ratings = {
    1: "%E2%AD%90+Very+Poor",
    2: "%E2%AD%90%E2%AD%90+Poor",
    3: "%E2%AD%90%E2%AD%90%E2%AD%90+Fair",
    4: "%E2%AD%90%E2%AD%90%E2%AD%90%E2%AD%90+Good",
    5: "%E2%AD%90%E2%AD%90%E2%AD%90%E2%AD%90%E2%AD%90+Excellent"
};

function rate(rating){

    document.getElementById("loading").style.display = "block";

    setTimeout(function(){

        if(rating >= 4){

    fetch(
        trackerUrl +
        "?rating=" +
        encodeURIComponent(
            rating === 5
            ? "⭐⭐⭐⭐⭐ Excellent"
            : "⭐⭐⭐⭐ Good"
        ),
        { mode: "no-cors" }
    ).finally(() => {

        window.location.href = "thankyou.html";

    });

    return;
}
        window.location.href = formBase + ratings[rating];

    },700);

}

</script>

</body>
</html>
