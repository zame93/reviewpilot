<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ReviewPilot</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:100%;
    max-width:500px;
    padding:40px 30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.logo{
    font-size:42px;
    font-weight:800;
    color:#E91E63;
    margin-bottom:10px;
}

.tagline{
    color:#666;
    margin-bottom:30px;
}

h1{
    color:#222;
    margin-bottom:10px;
}

.subtitle{
    color:#777;
    margin-bottom:35px;
}

.star{
    font-size:56px;
    cursor:pointer;
    color:#d9d9d9;
    transition:all .2s ease;
    user-select:none;
}

.star.active{
    color:#FFD700;
    transform:scale(1.15);
}

.star:hover{
    color:#FBBF24;
    transform:scale(1.15);
}
    .stars{
    display:flex;
    justify-content:center;
    gap:12px;
    margin:20px 0;
}

#ratingText{
    height:24px;
    margin-top:10px;
    font-weight:bold;
    color:#555;
    text-align:center;
}
.note{
    color:#999;
    font-size:14px;
    margin-top:25px;
}

.loading{
    display:none;
    margin-top:20px;
    color:#444;
    font-weight:bold;
}

@media(max-width:600px){

    .container{
        padding:30px 20px;
    }

    .star{
        font-size:34px;
    }

    h1{
        font-size:24px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">❤️ LoveView</div>

<div class="tagline">
    Reviews. Rewards. Relationships.
</div>

    <h1>How was your experience today?</h1>

<div class="subtitle">
    Your feedback helps us improve and serve you better.
</div>

<div class="microcopy">
    Takes less than 10 seconds ❤️
</div>

<div class="stars">

    <span class="star" onclick="rate(1)">★</span>
    <span class="star" onclick="rate(2)">★</span>
    <span class="star" onclick="rate(3)">★</span>
    <span class="star" onclick="rate(4)">★</span>
    <span class="star" onclick="rate(5)">★</span>

</div>

<div id="ratingText"></div>

<div class="note">
    ❤️ Every review helps local businesses grow.
</div>

<div id="loading" class="loading">
    ❤️ Thank you! Opening your next step...
</div>

</div>

<script>

const reviewUrl = "https://share.google/vzGgHviaoZLhTGFOl";

const trackerUrl =
"https://script.google.com/macros/s/AKfycbxbP8KXs5asASmq76L9Gs2mo3u1JOhQo4KEIocwIJR1Fj5xpfqkMwXmC3DJg9xmSw8/exec";

function rate(rating){document.querySelectorAll(".star").forEach((star,index)=>{

    if(index < rating){
        star.classList.add("active");
    }else{
        star.classList.remove("active");
    }

});

const labels = {
    1:"Very Poor",
    2:"Poor",
    3:"Fair",
    4:"Good",
    5:"Excellent"
};

document.getElementById("ratingText").innerText =
labels[rating];

    document.getElementById("loading").style.display = "block";

    setTimeout(function(){

    if(rating >= 4){

    fetch(
        trackerUrl +
        "?rating=" +
        encodeURIComponent(labels[rating]),
        { mode: "no-cors" }
    ).finally(() => {

        window.location.href =
            "thankyou.html?rating=" + rating;

    });

    return;
}

fetch(
    trackerUrl +
    "?rating=" +
    encodeURIComponent(labels[rating]),
    { mode: "no-cors" }
).finally(() => {

    window.location.href =
        "feedback.html?rating=" + rating;

});

},700);

}
</script>

</body>
</html>
